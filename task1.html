<!DOCTYPE html>
<html>
<head>
    <title>Internship Confirmation Form</title>
</head>
<body>
    <h2>Internship Confirmation Form</h2>
    <form>
    <label>Student Name:</label>
<input type="text" name="student_name" required>

<br><br>
<label>Email Address:</label>
<input type="email" name="email" required>

<br><br>
<p>Preferred Internship Type:</p>

<input type="radio" name="type" value="On-Site">
<label>On-Site</label>

<br>

<input type="radio" name="type" value="Remote">
<label>Remote</label>

<br><br>
    </form>
